name: StaffPulse Automation

on:
  schedule:
    - cron: '20 3 * * 1-6'   # 8:50 AM IST (Monday-Saturday)
    - cron: '20 13 * * 1-6'  # 6:50 PM IST (Monday-Saturday)
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'checkin'
        type: choice
        options:
          - checkin
          - checkout
      bypass_time:
        description: 'Bypass time restrictions'
        type: boolean
        default: false

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          USER1_NAME: ${{ secrets.USER1_NAME }}
          USER1_EMAIL: ${{ secrets.USER1_EMAIL }}
          USER1_PASSWORD: ${{ secrets.USER1_PASSWORD }}
          USER2_NAME: ${{ secrets.USER2_NAME }}
          USER2_EMAIL: ${{ secrets.USER2_EMAIL }}
          USER2_PASSWORD: ${{ secrets.USER2_PASSWORD }}
          USER3_NAME: ${{ secrets.USER3_NAME }}
          USER3_EMAIL: ${{ secrets.USER3_EMAIL }}
          USER3_PASSWORD: ${{ secrets.USER3_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BYPASS_TIME_CHECK: ${{ inputs.bypass_time == true && 'true' || 'false' }}
        run: |
          # Determine the action based on the event trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION="${{ inputs.action }}"
          elif [ "${{ github.event.schedule }}" = "20 3 * * 1-6" ]; then
            ACTION="checkin"
          elif [ "${{ github.event.schedule }}" = "20 13 * * 1-6" ]; then
            ACTION="checkout"
          else
            echo "Unknown trigger, defaulting to checkin"
            ACTION="checkin"
          fi
          
          echo "Executing action: $ACTION"
          python staffpulse_automation.py $ACTION