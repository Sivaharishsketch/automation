name: StaffPulse Automation

on:
  schedule:
    - cron: '20 3 * * 1-6'   # 8:50 AM IST
    - cron: '20 13 * * 1-6'  # 6:50 PM IST
  workflow_dispatch: # manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Checkin (Morning)
        if: github.event.schedule == '20 3 * * 1-6'
        run: python staffpulse_automation.py checkin

      - name: Run Checkout (Evening)
        if: github.event.schedule == '20 13 * * 1-6'
        run: python staffpulse_automation.py checkout