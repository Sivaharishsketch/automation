name: StaffPulse Automation

on:
  schedule:
    - cron: '20 3 * * 1-6'
    - cron: '20 13 * * 1-6'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ ADD THIS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python staffpulse_automation.py checkin